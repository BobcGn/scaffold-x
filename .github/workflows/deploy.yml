# Scaffold-X GitHub Pages 部署
# 职责：main 分支 push 后自动构建并部署到 GitHub Pages
name: Deploy to GitHub Pages

# 触发条件：main 分支 push
on:
  push:
    branches: [main]

# 同一分支的新提交自动取消旧运行
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 锁定 Node 版本为 22.x LTS
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 使用 lockfile 安装依赖
      - name: Install dependencies
        run: npm ci

      # 构建项目
      - name: Build
        run: npm run build

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
